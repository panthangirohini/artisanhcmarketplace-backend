spring.application.name=artisanmarketplace

# MySQL (use env vars in Render)
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://localhost:3306/artisan_marketplace}
spring.datasource.username=${JDBC_DATABASE_USERNAME:root}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=${PORT:8080}

# Static files
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# Upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Razorpay — get these from dashboard.razorpay.com → Settings → API Keys
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_XXXXXXXXXXXXXXXX}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:XXXXXXXXXXXXXXXXXXXXXXXX}

# JWT
jwt.secret=${JWT_SECRET:artisan-marketplace-super-secret-key-2024-do-not-expose}

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true